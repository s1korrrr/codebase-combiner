name: Bug report
description: Report a reproducible problem
title: '[Bug]: '
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
        Please search existing issues before filing a new one.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the bug.
      placeholder: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide minimal, repeatable steps.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happened?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs or attach screenshots.
      render: shell
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Version
      description: App or extension version.
      placeholder: 0.0.1
    validations:
      required: false
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - VS Code extension
        - macOS SwiftUI app
        - Docs/Other
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS + toolchain versions.
      placeholder: macOS 14.x, Node 18.x, Swift 6.x
    validations:
      required: false
