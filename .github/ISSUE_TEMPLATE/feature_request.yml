name: Feature request
description: Propose a new feature or improvement
title: '[Feature]: '
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Please include as much detail as possible.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the solution you'd like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What alternatives have you tried or considered?
    validations:
      required: false
  - type: textarea
    id: scope
    attributes:
      label: Scope and impact
      description: Who benefits and how? Any risks or compatibility notes?
    validations:
      required: false
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - VS Code extension
        - macOS SwiftUI app
        - Docs/Other
    validations:
      required: true
